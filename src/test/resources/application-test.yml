spring:
  datasource:
    url: jdbc:h2:mem:artha_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

artha:
  outbox:
    poll-ms: 1000

logging:
  level:
    root: WARN
    com.artha: INFO
